<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

  <title>Strategy AI — Визуальное стратегическое планирование с AI</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/logo.png"/>
  <link rel="apple-touch-icon" href="/logo.png"/>
  <link rel="mask-icon" href="/icon.svg" color="#8B5CF6"/>
  <link rel="manifest" href="/manifest.json"/>
  <!-- Open Graph -->
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Strategy AI — Визуальное стратегическое планирование с AI"/>
  <meta property="og:description" content="Карты целей, Gantt-план, AI-советник, симуляция сценариев. Для предпринимателей и команд."/>

  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Strategy AI"/>

  <meta name="twitter:image" content="/logo.png"/>
  <meta name="theme-color" content="#050410" media="(prefers-color-scheme: dark)"/>
  <meta name="theme-color" content="#ece9ff" media="(prefers-color-scheme: light)"/>
  <meta name="color-scheme" content="dark light"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin/>
  <link rel="dns-prefetch" href="https://images.unsplash.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/global.css"/>
  <link rel="stylesheet" href="/landing.css"/>
  <link rel="stylesheet" href="/strategy-shell.css"/>
  <link rel="stylesheet" href="/tailwind.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%}
    #root{width:100%;height:100%}
    body{font-family:'Inter',system-ui,sans-serif;background:#050410;color:#eaeaf8;-webkit-font-smoothing:antialiased}
    body[data-theme="dark"]{background:#050410;color:#eaeaf8}
    body[data-theme="light"]{background:#ece9ff;color:#08061a}
    #splash{position:fixed;inset:0;background:#050410;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
    #splash-logo{margin-bottom:20px}
    #splash-logo img{width:72px;height:72px;object-fit:contain}
    #splash p{font-size:14px;color:rgba(148,144,196,.62);margin-top:12px;letter-spacing:.06em}
    @keyframes pulse{0%,100%{box-shadow:0 0 36px rgba(104,54,245,.35)}50%{box-shadow:0 0 72px rgba(104,54,245,.55)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader{width:28px;height:28px;border:2px solid rgba(104,54,245,.22);border-top-color:#6836f5;border-radius:50%;animation:spin .8s linear infinite;margin-top:16px}
  </style>
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"Strategy AI","url":"https://www.strategy-ai.uz/","description":"Визуальное стратегическое планирование с AI-советником уровня McKinsey","applicationCategory":"BusinessApplication","operatingSystem":"Web","inLanguage":["ru","en","uz"],"offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
  </script>
</head>
<body>
  <script>
    (function(){
      try {
        var t = localStorage.getItem('sa_theme'); var p = localStorage.getItem('sa_palette');
        document.body.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        document.body.setAttribute('data-palette', (p && ['indigo','ocean','forest','orange','sunset','mono'].indexOf(p) >= 0) ? p : 'indigo');
      } catch (_) {}
    })();
    (function(){
      try{
        var sp=document.getElementById('splash');
        if(sp&&localStorage.getItem('sa_theme')==='light'){
          sp.style.background='#ece9ff';
          var h=document.getElementById('splash-heading');
          if(h) h.style.color='#08061a';
          var sub=sp.querySelector('p');
          if(sub) sub.style.color='rgba(70,58,130,.52)';
        }
      }catch(_){}
    })();
  </script>
  <div id="splash">
    <div id="splash-logo"><img src="/logo.png" alt="Strategy AI"/></div>
    <div id="splash-heading" style="font-size:22px;font-weight:800;color:#eaeaf8;letter-spacing:-0.5px">Strategy AI</div>
    <p>Загрузка...</p>
    <div class="loader"></div>
  </div>
  <div id="root"></div>

  <script>
    // URL бэкенда — устанавливается автоматически из текущего origin
    // (фронтенд и бэкенд на одном Railway сервисе)
    window.__STRATEGY_AI_API_URL__ = window.location.origin;
  </script>
  <script src="/env-config.js"></script>
  <script type="module" src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>
  <script>
    // Убираем splash когда React загрузился
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 500); }
      }, 300);
    });
  </script>
</body>
</html>
