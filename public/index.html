<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Strategy AI — визуальное стратегическое планирование с AI-советником"/>
  <title>Strategy AI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><text y='.9em' font-size='70' x='12'>✦</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;overflow:hidden}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0f1e;color:#f1f5f9}
    #splash{position:fixed;inset:0;background:#0a0f1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
    #splash-logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 60px rgba(99,102,241,.5);animation:pulse 2s infinite;margin-bottom:20px}
    #splash p{font-size:14px;color:#475569;margin-top:12px;letter-spacing:1px}
    @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(99,102,241,.4)}50%{box-shadow:0 0 80px rgba(99,102,241,.7)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader{width:28px;height:28px;border:2px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-top:16px}
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-logo">✦</div>
    <div style="font-size:22px;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px">Strategy AI</div>
    <p>Загрузка...</p>
    <div class="loader"></div>
  </div>
  <div id="root"></div>

  <script>
    // URL бэкенда — устанавливается автоматически из текущего origin
    // (фронтенд и бэкенд на одном Railway сервисе)
    window.__STRATEGY_AI_API_URL__ = window.location.origin;
  </script>
  <script src="/app.js"></script>
  <script>
    // Убираем splash когда React загрузился
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 500); }
      }, 300);
    });
  </script>
</body>
</html>
