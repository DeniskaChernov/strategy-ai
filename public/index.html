<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Strategy AI — визуальное стратегическое планирование с AI-советником уровня McKinsey. Карты целей, Gantt, сценарии, экспорт."/>
  <title>Strategy AI — Визуальное стратегическое планирование с AI</title>
  <link rel="icon" type="image/png" href="/logo.png"/>
  <link rel="apple-touch-icon" href="/logo.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <!-- Open Graph -->
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="Strategy AI — Визуальное стратегическое планирование с AI"/>
  <meta property="og:description" content="Карты целей, Gantt-план, AI-советник, симуляция сценариев. Для предпринимателей и команд."/>
  <meta property="og:image" content="/logo.png"/>
  <meta property="og:url" content="https://strategy-ai.app"/>
  <meta property="og:locale" content="ru_RU"/>
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Strategy AI"/>
  <meta name="twitter:description" content="Визуальное стратегическое планирование с AI-советником уровня McKinsey"/>
  <meta name="twitter:image" content="/logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%}
    #root{width:100%;height:100%}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0f1e;color:#e2e8f0}
    body[data-theme="dark"]{background:#060a12;color:#e2e8f0}
    body[data-theme="light"]{background:#f1f5f9;color:#0f172a}
    #splash{position:fixed;inset:0;background:#0a0f1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
    #splash-logo{margin-bottom:20px}
    #splash-logo img{width:72px;height:72px;object-fit:contain}
    #splash p{font-size:14px;color:#475569;margin-top:12px;letter-spacing:1px}
    @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(99,102,241,.4)}50%{box-shadow:0 0 80px rgba(99,102,241,.7)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader{width:28px;height:28px;border:2px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-top:16px}
  </style>
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"Strategy AI","description":"Визуальное стратегическое планирование с AI-советником уровня McKinsey","applicationCategory":"BusinessApplication","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"}}
  </script>
</head>
<body>
  <script>
    (function(){
      try {
        var t = localStorage.getItem('sa_theme'); var p = localStorage.getItem('sa_palette');
        document.body.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        document.body.setAttribute('data-palette', (p && ['indigo','ocean','forest','sunset','mono'].indexOf(p) >= 0) ? p : 'indigo');
      } catch (_) {}
    })();
  </script>
  <div id="splash">
    <div id="splash-logo"><img src="/logo.png" alt="Strategy AI"/></div>
    <div style="font-size:22px;font-weight:800;color:#f1f5f9;letter-spacing:-0.5px">Strategy AI</div>
    <p>Загрузка...</p>
    <div class="loader"></div>
  </div>
  <div id="root"></div>

  <script>
    // URL бэкенда — устанавливается автоматически из текущего origin
    // (фронтенд и бэкенд на одном Railway сервисе)
    window.__STRATEGY_AI_API_URL__ = window.location.origin;
  </script>
  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>
  <script>
    // Убираем splash когда React загрузился
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 500); }
      }, 300);
    });
  </script>
</body>
</html>
